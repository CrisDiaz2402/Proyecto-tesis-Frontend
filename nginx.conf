# nginx.conf — Configuración para Vue 3 SPA
# Colocar en: Proyecto-tesis-Frontend/nginx.conf

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Compresión gzip para mejor performance
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;

    # Vue Router: todas las rutas van a index.html
    location / {
        # EVITAR que el navegador guarde el index.html en caché.
        # Obliga a descargar el HTML fresco que apunta a los nuevos archivos JS.
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0";
        try_files $uri $uri/ /index.html;
    }

    # Cache para assets estáticos (JS, CSS, imágenes compiladas)
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Proxy para el backend (evita problemas de CORS en producción)
    location /api/ {
        proxy_pass http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_cache_bypass $http_upgrade;

        # Timeout mayor para streaming (evaluaciones largas)
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }
}